name: Node Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: smartapp/package-lock.json
      - run: npm ci
        working-directory: smartapp
      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: smartapp
